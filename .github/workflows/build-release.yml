name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-python-packages:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check if tag is on main branch
        if: github.event_name == 'push'
        run: |
          git branch -r --contains ${{ github.ref }} | grep -q 'origin/main'
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      
      - name: Sync dependencies
        run: uv sync --all-packages --all-groups
      
      - name: Build wheel
        run: uv build --all-packages
      
      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: python/dist/*.*

  build-react-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openprinttag-web-viewer

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: openprinttag-web-viewer/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: CI=false REACT_APP_VERSION=${{ github.ref_name }} npm run build

      - name: Archive build
        run: tar -czf ../openprinttag-web-viewer-${{ github.ref_name }}.tar.gz -C build .

      - name: Upload React artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-app
          path: openprinttag-web-viewer-${{ github.ref_name }}.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build-python-packages, build-react-app]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-packages
          path: dist/

      - name: Download React artifact
        uses: actions/download-artifact@v4
        with:
          name: react-app
          path: dist/

      - name: List release artifacts
        run: ls -laR dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
